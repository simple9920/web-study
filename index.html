<!DOCTYPE html>
<html>
<head>
    <title>My Firdst Page</title>

    <style>
        h1{
            font-size: 40px;
        }

        li{
            color: skyblue;
        }

        .profile{
            color: orange;
            font-size: 20px;
        }

        .title{
            color: yellow;
        }

        .section{
            border: 2px solid white;
            padding: 15px;
            margin: 20px 0;
        }

        .container{
            display: flex;
            gap: 30px;
            justify-content:center;
        }

        .card{
            width: 220px;
            border: 2px solid white;
            padding: 10px;
        }
    
        .card img{
            width: 100%;
        }
        
        .page{
            width: 900px;
            margin: 0 auto;
        }

        body{
            background-color: #222;
            color: white;
            font-family: Arial;
        }

        .nav{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        .nav a{
            color:white;
            text-decoration:none;
        }
    </style>

</head>

<body>

<div class="nav">
    <a href="#">Home</a>
    <a href="#">Profile</a>
    <a href="#">Hobby</a>
    <a href="#">Contact</a>
</div>

<div class="page">
<h1 id="title">私のプロフィール</h1>

<p id="text">これはテキスト</p>

<button onclick="changeAll()">全部変更</button>
<button onclick="changeTitle()">タイトル変更</button>
<button onclick="changeText()">テキスト変更</button>

<div class="container">

<div class="section">
<h2>基本情報</h2>
<p class="profile">名前：simpe9920</p>
</div>

<div class="section">
<h2 class="title">趣味：</h2>
<ul>
<li>車</li>
<li>ゲーム</li>
<li>バイク</li>
</ul>
</div>

<ul id="list"></ul>
<button onclick="addItems()">追加</button>

<div class="card">
<h3>好きな車</h3>

<img src="http://picsum.photos/200">

<p>スポーツカーが好き</p>

<a href="http://google.com">詳しく見る</a>

</div>

<div class="card">
    <h3>好きなゲーム</h3>
    <img src="http://picsum.photos/201">
    <p>FPSが好き</p>
    <a href="http://google.com">詳しく見る</a>
</div>

<div class="section">
<h2>リンク</h2>
<a href="http://google.com">Google</a><br>
<a href="https://www.yahoo.co.jp/">Yahoo!Japan</a>

<h2>画像</h2>
<img src="https://picsum.photos/300/200" width="200">
</div>

</div>

<script>
    console.log("Hello JS");

    let h1 = document.getElementById("title"); 
    h1.textContent = "JSで変更!";
</script>

<script>
function changeAll(){
    let h1 = document.getElementById("title");
    let p = document.getElementById("text");

    h1.textContent = "タイトル変更";
    p.textContent = "テキスト変更";
}

function changeTitle(){
    let h1 = document.getElementById("title");
    
    if(h1.textContent ==="タイトル変更"){
        h1.textContent = "元に戻す";
    }else{
        h1.textContent = "タイトル変更";
    }
}

function changeText(){
    let p = document.getElementById("text");

    if(p.textContent === "これはテキスト"){
        p.textContent = "テキスト変更";
    } else {
        p.textContent = "これはテキスト";
    }
}

function addItems() {
    let ul = document.getElementById("list");

    let count = ul.children.length;

    for(let i = 0; i < 5; i++){
        let li = document.createElement("li");
        li.textContent = "アイテム " + (count + i + 1);

        li.onclick = () => {
            li.remove();
        };
        
        ul.appendChild(li);
    }
}
</script>

</body>
</html>
